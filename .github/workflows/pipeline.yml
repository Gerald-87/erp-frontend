name: ERP Frontend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # Your Ubuntu server

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Confirm Node and NPM versions
      - name: Confirm Node and NPM
        run: |
          node -v
          npm -v

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: ./erp-frontend  # adjust path if package.json is elsewhere

      # 4️⃣ Build frontend
      - name: Build frontend
        run: npm run build
        working-directory: ./erp-frontend

      # 5️⃣ Restart frontend service
      - name: Restart frontend service
        run: sudo systemctl restart erp-frontend
