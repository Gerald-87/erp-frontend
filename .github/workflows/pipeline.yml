name: ERP Frontend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm Node and NPM versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Restart frontend service
        run: sudo systemctl restart erp-frontend
