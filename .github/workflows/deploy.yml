name: Deploy ERP Frontend

on:
  push:
    branches:
      - rolaface
      - udvell

concurrency:
  group: erp-frontend-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.ref_name }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Deployment Path
        id: setpath
        run: |
          if [ "${{ github.ref_name }}" = "rolaface" ]; then
            echo "APP_PATH=/srv/apps/erp/frontend/rolaface/prod" >> $GITHUB_ENV
            echo "IMAGE_NAME=ghcr.io/rolaface/erp-rolaface-frontend" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "APP_PATH=/srv/apps/erp/frontend/udvell/prod" >> $GITHUB_ENV
            echo "IMAGE_NAME=ghcr.io/rolaface/erp-udvell-frontend" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Image
        run: |
          docker build \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -t ${IMAGE_NAME}:${{ github.sha }} \
            --build-arg VITE_API_BASE_URL="${{ secrets.ERP_API_BASE_URL }}" \
            --build-arg VITE_API_AUTH_TOKEN="${{ secrets.ERP_AUTH_TOKEN }}" \
            --build-arg VITE_COMPANY_ID="${{ secrets.ERP_COMPANY_ID }}" \
            --build-arg VITE_NAPSA_BASE_URL="${{ secrets.ERP_NAPSA_BASE_URL }}" \
            .

          docker push ${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${IMAGE_NAME}:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ "${{ github.ref_name }}" = "rolaface" ]; then
                APP_PATH="/srv/apps/erp/frontend/rolaface/prod"
            else
                APP_PATH="/srv/apps/erp/frontend/udvell/prod"
            fi

            cd $APP_PATH
            chmod +x deploy.sh
            ./deploy.sh
